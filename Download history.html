<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montaser ♥ Sarah | Engagement Party 💍</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0c0c2a 0%, #1a0a3a 50%, #0c0c2a 100%);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            color: white;
        }

        /* Floating Hearts */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-particle {
            position: absolute;
            color: #ff69b4;
            font-size: 16px;
            animation: float-hearts 10s ease-in-out infinite;
        }

        @keyframes float-hearts {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-40px) rotate(360deg); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .engagement-icon {
            font-size: clamp(4rem, 15vw, 7rem);
            background: var(--secondary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 105, 180, 0.9));
            animation: pulse 2s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .hero-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Names Section */
        .names-section {
            display: flex;
            flex-direction: column; /* الموبايل بيحتاج ترتيب رأسي */
            align-items: center;
            gap: 20px;
            margin: 40px 0;
            width: 100%;
        }

        .name-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .name-display {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff69b4, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .name-role {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .engagement-heart {
            font-size: 4rem;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Couple Photo */
        .photo-frame {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 3px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin: 40px 0;
            text-align: center;
        }

        .couple-photo {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            object-fit: cover;
            border: 4px solid #ff69b4;
        }

        /* Event Section */
        .event-section {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            margin-bottom: 40px;
        }

        .event-date {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 900;
            background: var(--primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .event-time {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f093fb;
            margin-bottom: 20px;
            display: block;
        }

        .event-location {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .location-link {
            color: #4facfe;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 20px;
            border: 2px solid #4facfe;
            border-radius: 25px;
            display: inline-block;
            background: rgba(79, 172, 254, 0.1);
        }

        .closing {
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.6;
            padding-bottom: 50px;
        }

        /* Media Query for Desktop (عشان يفضل شكله حلو ع الكمبيوتر برضه) */
        @media (min-width: 769px) {
            .names-section {
                flex-direction: row;
                justify-content: center;
                gap: 50px;
            }
            .name-card {
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="hero">
            <div class="engagement-icon">💎</div>
            <h1 class="hero-title">Engagement Celebration</h1>
        </div>

        <div class="names-section">
            <div class="name-card">
                <div class="name-display">MONTSER </div>
                <div class="name-role">The Groom</div>
            </div>

            <div class="engagement-heart">💍</div>

            <div class="name-card">
                <div class="name-display">SARAH</div>
                <div class="name-role">The Bride</div>
            </div>
        </div>

        <div class="photo-frame">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500&h=500&fit=crop" 
                 alt="Montaser & Sarah" class="couple-photo">
            <div style="margin-top: 15px; font-weight: 800;">Montaser & Sarah</div>
        </div>

        <div class="event-section">
            <div class="event-date">24.04.2026</div>
            <div class="event-time">At 9:00 PM</div>
            <h2 style="margin-bottom: 15px; font-size: 1.5rem;">Engagement Party</h2>
            <div class="event-location">
                VIP Events Hall<br>
                Shubra Al Kheima<br>
                Nile Corniche
                <br><br>
                <a href="https://maps.google.com" target="_blank" class="location-link">
                    📍 Get Directions
                </a>
            </div>
        </div>

        <div class="closing">
            We would be honored by your presence 💎<br>
            <span style="color: #ff69b4; font-weight: 700;">
                May Allah bless this new beginning ✨
            </span>
        </div>
    </div>

    <script>
        function createHearts() {
            const container = document.getElementById('particles');
            const hearts = ['💍', '💎', '♥', '💕', '💖'];
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }
        document.addEventListener('DOMContentLoaded', createHearts);
    </script>
</body>
</html>
